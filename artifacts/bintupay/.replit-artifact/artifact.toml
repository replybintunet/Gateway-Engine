kind = "web"
previewPath = "/"
title = "BintuPay Gateway"
version = "1.0.0"
id = "artifacts/bintupay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19562

[services.development]
run = "pnpm --filter @workspace/bintupay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bintupay", "run", "build" ]
publicDir = "artifacts/bintupay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19562"
BASE_PATH = "/"
