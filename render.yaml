# Render Blueprint — One-click deploy for BintuPay
# Go to https://dashboard.render.com/blueprints and connect this repo

services:
  - type: web
    name: bintupay-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: BASE_PATH
        value: /
      - key: DATABASE_URL
        fromDatabase:
          name: bintupay-db
          property: connectionString
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://bintupay-api.onrender.com

  - type: static
    name: bintupay-web
    runtime: static
    buildCommand: cd artifacts/bintupay && pnpm install && pnpm run build
    staticPublishPath: ./artifacts/bintupay/dist/public
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /api/*
        destination: https://bintupay-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: bintupay-db
    databaseName: bintupay
    user: bintu
    plan: free
    region: oregon
    ipAllowList: []
